<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ザクザクコインクリッカー</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #333; }
        .score-container {
            font-size: 2rem;
            font-weight: bold;
            color: #e67e22;
            margin: 20px 0;
        }
        /* クリックするボタン（コイン）の見た目 */
        #click-btn {
            width: 150px;
            height: 150px;
            font-size: 5rem;
            color: #a84300;
            background-color: #f1c40f;
            border: 8px solid #f39c12;
            cursor: pointer;
            box-shadow: 0 8px #d35400;
            transition: transform 0.05s;
            outline: none;
            user-select: none;
        }
        /* クリックした瞬間に少し沈むアニメーション */
        #click-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px #d35400;
        }
        .shop {
            margin: 30px auto;
            max-width: 300px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .shop-btn {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .shop-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <audio id="bgm-sound" src="bgm.mp3" loop></audio>
    <audio id="click-sound" src="click.mp3"></audio>

    <h1>💎 コインクリッカー 💎</h1>

    <div class="score-container">
        コイン: <span id="score">0</span>
    </div>

    <!-- メインのクリックボタン -->
    <button id="click-btn">$</button>

    <!-- ショップ -->
    <div class="shop">
        <h1>ショップ</h1>
        <p>1秒ごとに自動で<span id="auto-p">1</span>コインゲット</p>
        <button id="buy-auto-btn" class="shop-btn">自動連打機を購入（コスト:100）</button>
        <p style="font-size: 1.5rem; color: #666;">オートパワー:<span id="auto-count">0</span></p>

        <p>クリックで手に入るコインを<span id="click-power-p">1</span>上げる</p>
        <button id="buy-click-power-btn" class="shop-btn">クリックパワーを購入（コスト:50）</button>
        <p style="font-size: 1.5rem; color: #666;">クリックパワー:<span id="click-power-count">1</span></p>

        <p>リバースでコインや強化が一番最初に戻る代わりに倍率が上がる</p>
        <button id="buy-reverse-btn" class="shop-btn">★リバース★（コスト:1000）</button>
        <p style="font-size: 1.5rem; color: #666;">リバース回数:<span id="reverse-count">0</span></p>
    </div>

    <div class="shop" id="gacha-shop" style="background: #e8f8f5; border: 2px solid #a3e4d7; display: none;">
        <h1>仲間ガチャ</h1>
        <p>10000コインで仲間をゲット!（自動連打が全体パワーアップ）</p>
        <button id="gacha-btn-otamesi" class="shop-btn">お試しで引く（コスト:0）</button><br>
        <button id="gacha-btn" class="shop-btn">ガチャを引く（コスト:10000）</button>
        <p style="font-size: 1.5rem; color: #666;">最新の仲間:<span id="gacha-result">まだ誰もいません</span></p>
        <p style="font-size: 1.5rem; color: #e67e22;">🔥仲間ボーナス合計: +<span id="bonus-display">0</span>%</p>
    </div>

    <div class="shop" style="background: #fcf3cf; border: 2px solid #f4d03f; margin-top: 20px; text-align: left; padding: 20px;">
        <h2 style="text-align: center; color: #b7950b; margin-top: 0;">📖キャラクター図鑑📖</h2>
        <p style="text-align: center; color: #7d6608; font-weight: bold;">
            コンプリート率: <span id="completion-rate">0</span>%(<span id="unlocked-count">0</span> / 10)
        </p>
        
        <!-- ここにキャラクターの図鑑の中身が自動で並びます -->
         <div id="encyclopedia-container" style="display: flex; flex-direction: column; gap: 10px; max-height: 300px; overflow-y: auto; background: white; padding: 10px; border-radius: 8px; border: 1px solid #f1c40f;">
            <!-- Javascriptで中身を作ります -->
         </div>
    </div>

    <!-- Xへ成果をシェア -->
    <a id="tweet-new-link" href="#" target="_blank" style="display: inline-block; background-color: #1DA1F2; color: white; font-size: 1.2rem; font-weight: bold; padding: 10px 20px; border: none; border-radius: 25px; margin-top: 15px; text-decoration: none; cursor: pointer;">
        Xにハイスコアをツイートする
    </a>

    <div style="background: #e8f8f5; border: 2px solid #a3e4d7; margin-top: 20px;">
        <h1>🎮　Takki のゲーム開発　🎮</h1>
        <div style="font-size: 1.5rem; color: #666;">ぼくが作ったゲームの一覧が見れるサイトです</div>
        <a href="https://takki-game-dev.github.io/my-games-home/">サイトへ行く</a>
    </div>

    <script>
        // --- データの管理 ---
        let score = parseInt(localStorage.getItem('save_score')) || 0;
        let autoClickers = parseInt(localStorage.getItem('save_autos')) || 0;
        let autoCost = parseInt(localStorage.getItem('save_cost')) || 100;
        let clickPower = parseInt(localStorage.getItem('save_click_power')) || 1;
        let clickPowerCost = parseInt(localStorage.getItem('save_click_power_cost')) || 50;
        let reverse = parseInt(localStorage.getItem('save_reverse')) || 0;
        let reverseCost = parseInt(localStorage.getItem('save_reverse_cost')) || 1000; 
        let currentCompanion = localStorage.getItem('save_companion') || "まだ誰もいません";
        let companionMultiplier = parseInt(localStorage.getItem('save_companion_multiplier')) || 0.0;
        let gachaCost = parseInt(localStorage.getItem('save_gacha_cost')) || 10000;
        let otamesi = parseInt(localStorage.getItem('save_otamesi')) || 0;

        // --- 画面上の要素を取得 ---
        const bgmSound = document.getElementById('bgm-sound');
        const clickSound = document.getElementById('click-sound');
        const scoreDisplay = document.getElementById('score');
        const clickBtn = document.getElementById('click-btn');
        const buyAutoBtn = document.getElementById('buy-auto-btn');
        const autoCountDisplay = document.getElementById('auto-count');
        const buyClickPowerBtn = document.getElementById('buy-click-power-btn');
        const clickPowerCountDisplay = document.getElementById('click-power-count');
        const buyReverseBtn = document.getElementById('buy-reverse-btn');
        const reverseCountDisplay = document.getElementById('reverse-count');
        const autoPDisplay = document.getElementById('auto-p');
        const clickPowerPDisplay = document.getElementById('click-power-p');
        const gachaShop = document.getElementById('gacha-shop');
        const gachaBtn = document.getElementById('gacha-btn');
        const gachaResultDisplay = document.getElementById('gacha-result');
        const bonusDisplay = document.getElementById('bonus-display'); // ★追加：倍率表示用
        const gachaBtnOtamesi = document.getElementById('gacha-btn-otamesi');

        // --- 📖 キャラクター図鑑マスターデータ（十種類） ---
        const characterRegistry = [
            { id: 0, name: "お手伝いネコ", rarity: "Common", multiplier: 0.1, desc: "ネコの手でクリックしてくれるがんばり屋さんなネコ"},
            { id: 1, name: "見習い魔法使い", rarity: "Common", multiplier: 0.15, desc: "まだ魔法が上手に使えないけど、がんばってコインを生み出す"},
            { id: 2, name: "応援ロボ", rarity: "Rare", multiplier: 0.3, desc: "最新のテクノロジーでプレイヤーを応援するロボット"},
            { id: 3, name: "黄金のブタ貯金箱", rarity: "Rare", multiplier: 0.4, desc: "持っているだけで勝手にコインがあふれ出てくる不思議な貯金箱"},
            { id: 4, name: "さすらいの剣士", rarity: "Epic", multiplier: 0.6, desc: "鋭い剣技で、コインをザクザクする。数が増えているのでＯＫ"},
            { id: 5, name: "サイバー忍者", rarity: "Epic", multiplier: 0.8, desc: "影からオートクリッカーをプログラミングして、効率を上げる"},
            { id: 6, name: "🌟大賢者", rarity: "Legend", multiplier: 1.2, desc: "古代の魔法を操り、オートパワーを爆発的に高める大魔法使い"},
            { id: 7, name: "✨ゴールドロボット", rarity: "Legend", multiplier: 1.5, desc: "全身が金でできた謎のロボット。歩くたび大量のコインが生成される"},
            { id: 8, name: "👑クリスタルキング", rarity: "Mythic", multiplier: 2.0, desc: "すべての富を手にした伝説の王様。その力で大量にコインを集める"},
            { id: 9, name: "🌌未来からの来訪者", rarity: "Mythic", multiplier: 3.0, desc: "未来の科学で作られた、無限にコインを増殖させる謎多き宇宙人"}
        ];

        // プレイヤーがゲットしたキャラクターを記録する
        let unlockedCharacters = JSON.parse(localStorage.getItem('save_unlocked_chars')) || [];

        // --- Xへツイートする処理 ---
        function updateTweetLink() {
            const tweetLink = document.getElementById('tweet-new-link');
            if (!tweetLink) return;

            const text = `Takkiのコインクリッカーゲームで、なんと${score}コイン達成！リバース回数は${reverse}回だよ！ https://takki-game-dev.github.io/coin-clicker-game/`
            const hashtags = "coin_clicker,プログラミング";

            const twitterUrl = `https://x.com${encodeURIComponent(text)}&hashtags=${encodeURIComponent(hashtags)}`;

            tweetLink.href = twitterUrl;
        }

        // --- 画面表示を更新する関数 ---
        function updateDisplay() {
            scoreDisplay.textContent = score;
            autoCountDisplay.textContent = Math.floor(autoClickers * (reverse + 1) * (1 + companionMultiplier / 100));
            clickPowerCountDisplay.textContent = clickPower * (reverse + 1);
            reverseCountDisplay.textContent = reverse;
            autoPDisplay.textContent = reverse + 1;
            clickPowerPDisplay.textContent = reverse + 1;
            buyAutoBtn.textContent = `自動連打機を購入（コスト:${autoCost}）`;
            buyClickPowerBtn.textContent = `クリックパワーを購入（コスト:${clickPowerCost}）`;
            buyReverseBtn.textContent = `★リバース★（コスト:${reverseCost}）`;
            gachaBtn.textContent = `ガチャを引く（コスト:${gachaCost}）`

            // コストが足りない時はボタンを押せなくする
            // 自動
            if (score >= autoCost) {
                buyAutoBtn.disabled = false;
            } else {
                buyAutoBtn.disabled = true;
            }

            // 手動
            if (score >= clickPowerCost) {
                buyClickPowerBtn.disabled = false;
            } else {
                buyClickPowerBtn.disabled = true;
            }

            // リバース
            if (score >= reverseCost) {
                buyReverseBtn.disabled = false;
            } else {
                buyReverseBtn.disabled = true;
            }

            // ガチャ
            if (reverse >= 1) {
                gachaShop.style.display = 'block';
            } else {
                gachaShop.style.display = 'none';
            }

            if (score >= gachaCost) {
                gachaBtn.disabled = false;
            } else {
                gachaBtn.disabled = true;
            }

            if (otamesi == 0) {
                gachaBtnOtamesi.style.display = 'block';
            } else {
                gachaBtnOtamesi.style.display = 'none';
            }

            gachaResultDisplay.textContent = currentCompanion;
            bonusDisplay.textContent = Math.floor(companionMultiplier);

            // === 📖 図鑑の表示を更新する処理 ===
            const encyclopediaContainer = document.getElementById('encyclopedia-container');
            const completionRateDisplay = document.getElementById('completion-rate');
            const unlockedCountDisplay = document.getElementById('unlocked-count');

            // 一度図鑑の表示をクリアして、最新のデータで作り直す
            encyclopediaContainer.innerHTML = "";

            // キャラクターを一体ずつ図鑑に並べていく
            characterRegistry.forEach(char =>{
                // プレイヤーがこのキャラクターを持っているか
                const isUnlocked = unlockedCharacters.includes(char.id)

                // キャラクター1体分を囲む箱を作る
                const charBox = document.createElement('div')
                charBox.style.padding = "8px";
                charBox.style.borderRadius = "5px";
                charBox.style.marginBottom = "5px";
                charBox.style.fontSize = "1.2rem";

                if (isUnlocked) {
                    // 【ゲットしている場合】きれいにカラーで表示
                    charBox.style.background = "#f4f6f7";
                    charBox.style.borderLeft = "6px solid #f1c40f";
                    charBox.innerHTML = ` 
                        <strong>${char.name}</strong> <span style="font-size:0.9rem; color:#f39c12;">[${char.rarity}]</span> (+${Math.floor(char.multiplier * 100)}%)<br>
                        <span style="font-size:1rem; color:#5d6d7e;">${char.desc}</span>
                    `;
                } else {
                    // 【まだ持っていない場合】グレーの？？？で隠す
                    charBox.style.background = "#eaeded";
                    charBox.style.borderLeft = "6px solid #bdc3c7";
                    charBox.style.color = "#95a5a6";
                    charBox.innerHTML = ` 
                        <strong>？？？？？</strong> <span style="font-size:0.9rem;">[${char.rarity}]</span> (+${Math.floor(char.multiplier * 100)}%)<br>
                        <span style="font-size:1rem;">(ガチャを引いて新しい仲間を見つけよう！)</span>
                    `;
                }

                // 完成した箱を図鑑の中に追加する
                encyclopediaContainer.appendChild(charBox);
            });

            // コンプリート率の計算
            unlockedCountDisplay.textContent = unlockedCharacters.length;
            const rate = (unlockedCharacters.length / characterRegistry.length) * 100;
            completionRateDisplay.textContent = Math.floor(rate);

            updateTweetLink();
        }

        // --- セーブをする関数 ---
        function saveGame() {
            localStorage.setItem('save_score',score);
            localStorage.setItem('save_autos',autoClickers);
            localStorage.setItem('save_cost',autoCost);
            localStorage.setItem('save_click_power',clickPower);
            localStorage.setItem('save_click_power_cost',clickPowerCost);
            localStorage.setItem('save_reverse',reverse);
            localStorage.setItem('save_reverse_cost',reverseCost);
            localStorage.setItem('save_companion',currentCompanion);
            localStorage.setItem('save_companion_multiplier',companionMultiplier);
            localStorage.setItem('save_gacha_cost',gachaCost);
            localStorage.setItem('save_otamesi',otamesi);
            localStorage.setItem('save_unlocked_chars',JSON.stringify(unlockedCharacters));
        }

        // --- 1. コインをクリックしたときの処理 ---
        clickBtn.addEventListener('click', () => {
            // クリックされた瞬間に効果音を最初から再生する
            clickSound.currentTime = 0;
            clickSound.play();

            score += clickPower * (reverse + 1);
            updateDisplay();
            saveGame(); // ★ここで自動セーブ！
        });

        // --- 2. 自動化アイテムを購入した時の処理 ---
        buyAutoBtn.addEventListener('click', () => {
            if (score >= autoCost) {
                score -= autoCost;  // コインを消費
                autoClickers += 1;  // アイテムを増やす
                autoCost = Math.floor(autoCost * 1.5);  // 次のコストを1.5倍に
                updateDisplay();
                saveGame(); // ★ここで自動セーブ！
            }
        });

        // --- 3. 手動アイテムを購入した時の処理 ---
        buyClickPowerBtn.addEventListener('click', () => {
            if (score >= clickPowerCost) {
                score -= clickPowerCost;  // コインを消費
                clickPower += 1;  // アイテムを増やす
                clickPowerCost = Math.floor(clickPowerCost * 1.5);  // 次のコストを1.5倍に
                updateDisplay();
                saveGame(); // ★ここで自動セーブ！
            }
        });

        // --- 4. リバースした時の処理 ---
        buyReverseBtn.addEventListener('click', () => {
            if (score >= reverseCost) {
                score -= reverseCost; // コインを消費
                reverse += 1; // アイテムを増やす
                reverseCost = Math.floor(reverseCost * 1.5); // 次のコストを1.5倍に
                clickPower = 1;
                clickPowerCost = 50;
                autoClickers = 0;
                autoCost = 100;
                score = 0;
                companionMultiplier = 0;
                gachaCost = 10000 * reverse;
                updateDisplay();
                saveGame(); // ★ここで自動セーブ！
            }
        });

        // --- 5. ガチャボタンをクリックしたときの処理 ---
        gachaBtn.addEventListener('click', () => {
            if (score >= gachaCost) {
                score -= gachaCost; // コインを消費

                // ランダムで仲間が加わり、倍率が足し算される
                const r = Math.random();
                let pickedId = 0;

                // 確率
                if (r < 0.35) {
                    // 35% Common
                    pickedId = Math.random() < 0.5 ? 0 : 1;
                } else if (r < 0.65) {
                    // 30% Rare
                    pickedId = Math.random() < 0.5 ? 2 : 3;
                } else if (r < 0.85) {
                    // 20% Epic
                    pickedId = Math.random() < 0.5 ? 4 : 5;
                } else if (r < 0.97) {
                    // 12% Legend
                    pickedId = Math.random() < 0.5 ? 6 : 7;
                } else {
                    // 3% Mythic
                    pickedId = Math.random() < 0.5 ? 8 : 9;
                }

                // マスターデータから、当たったキャラクターの情報を引っ張ってくる
                const wonChar = characterRegistry[pickedId];

                // 現在のリーバース回数込みの倍率
                const realPower = Math.floor(wonChar.multiplier * reverse * 100)

                // 📢 画面の最新の仲間の文字を更新
                currentCompanion = `${wonChar.name} [${wonChar.rarity}] (現在のパワー: +${realPower}%)`;

                // 【重要】まだ図鑑に登録されていないキャラだった場合の処理
                if (!unlockedCharacters.includes(wonChar.id)) {
                    // 図鑑のリストにキャラクターのIDを追加
                    unlockedCharacters.push(wonChar.id);
                } else {
                    // 持っていた場合は少しだけ倍率を上げる
                    companionMultiplier += wonChar.multiplier * 0.2;
                    currentCompanion += "（かぶり強化）";
                }

                // 倍率を+
                companionMultiplier += realPower;

                // 画面更新＆セーブ
                updateDisplay();
                saveGame();
            }
        });

        gachaBtnOtamesi.addEventListener('click', () => {
            if (otamesi == 0) {
                otamesi = 1;
                
                // ランダムで仲間が加わり、倍率が足し算される
                const r = Math.random();
                let pickedId = 0;

                // 確率
                if (r < 0.35) {
                    // 35% Common
                    pickedId = Math.random() < 0.5 ? 0 : 1;
                } else if (r < 0.65) {
                    // 30% Rare
                    pickedId = Math.random() < 0.5 ? 2 : 3;
                } else if (r < 0.85) {
                    // 20% Epic
                    pickedId = Math.random() < 0.5 ? 4 : 5;
                } else if (r < 0.97) {
                    // 12% Legend
                    pickedId = Math.random() < 0.5 ? 6 : 7;
                } else {
                    // 3% Mythic
                    pickedId = Math.random() < 0.5 ? 8 : 9;
                }

                // マスターデータから、当たったキャラクターの情報を引っ張ってくる
                const wonChar = characterRegistry[pickedId];

                // 現在のリーバース回数込みの倍率
                const realPower = Math.floor(wonChar.multiplier * reverse * 100)

                // 📢 画面の最新の仲間の文字を更新
                currentCompanion = `${wonChar.name} [${wonChar.rarity}] (現在のパワー: +${realPower}%)`;

                // 【重要】まだ図鑑に登録されていないキャラだった場合の処理
                if (!unlockedCharacters.includes(wonChar.id)) {
                    // 図鑑のリストにキャラクターのIDを追加
                    unlockedCharacters.push(wonChar.id);
                } else {
                    // 持っていた場合は少しだけ倍率を上げる
                    companionMultiplier += wonChar.multiplier * 0.2;
                    currentCompanion += "（かぶり強化）";
                }

                // 倍率を+
                companionMultiplier += realPower;

                // 画面更新＆セーブ
                updateDisplay();
                saveGame();
            }
        });

        // --- 6. 1秒ごとに自動で実行される処理 ---
        setInterval(() => {
            if (autoClickers > 0) {
                let baseAutoPower = autoClickers * (reverse + 1);
                score += Math.floor(baseAutoPower * (1 + companionMultiplier / 100));  // アイテムの数だけコインが増える
                updateDisplay();
                saveGame();
            }
        }, 1000);

        // 最初の一回、画面を更新
        updateDisplay();

        // 画面のどこかがクリックされたら、自動でＢＧＭを再生する仕組み
        document.addEventListener('click', () => {
            bgmSound.play().catch(error => {
                // 最初のエラーを無視するための安全なおまじない
            });
        },{ once: true }); // once: true をつけると、最初の一回だけ実行される
    </script>
</body>
</html>
